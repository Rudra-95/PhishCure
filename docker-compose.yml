version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: fakenews_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fakenews
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fakenews_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
